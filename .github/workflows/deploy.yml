name: Deploy Portfolio to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            tritranintech/portfolio-app:latest
            tritranintech/portfolio-app:v${{ github.run_number }}

      # THÊM BƯỚC NÀY ĐỂ KÍCH HOẠT DEPLOY TRÊN SERVER THẦY GIÁO
      - name: Trigger Deployment Webhook
        run: curl -X POST ${{ secrets.DEPLOY_URL }}
name: Deploy Portfolio to Docker Hub

# 1. Kích hoạt tự động khi đẩy code lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Mượn máy ảo Ubuntu của GitHub để chạy

    steps:
      # Bước 1: Robot tải code từ kho lưu trữ của bạn về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Robot dùng Secrets để đăng nhập an toàn vào Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 3: Robot tự động Build Dockerfile và Push Image lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đặt tên và dán nhãn (tag) cho Image
          tags: tritranintech/portfolio-app:latest
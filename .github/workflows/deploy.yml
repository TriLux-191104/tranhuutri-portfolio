name: Deploy Portfolio to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # CHÚ Ý PHẦN NÀY ĐÃ ĐƯỢC SỬA LẠI:
          # Vừa đẩy tag 'latest', vừa đẩy tag động 'v1', 'v2', 'v3'... dựa theo số lần chạy của GitHub
          tags: |
            tritranintech/portfolio-app:latest
            tritranintech/portfolio-app:v${{ github.run_number }}

      # GỌI WEBHOOK ĐỂ SERVER THẦY GIÁO TỰ ĐỘNG KÉO CODE MỚI VỀ
      - name: Call Webhook Server
        run: curl -X POST ${{ secrets.DEPLOY_URL }}
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Hữu Trí - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 100px 0; }
    </style>
</head>
<body>

<header class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Xin chào, Tôi là Trần Hữu Trí</h1>
        <p class="lead">Lập trình viên Backend | Java | Spring Boot | Docker</p>
    </div>
</header>

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Liên hệ với tôi</h2>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <form th:action="@{/contact}" th:object="${contact}" method="post" class="shadow p-4 rounded bg-light">
                <div class="mb-3">
                    <label for="name" class="form-label">Tên của bạn</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Lời nhắn</label>
                    <textarea id="message" th:field="*{message}" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Gửi lời nhắn</button>
            </form>
        </div>
    </div>
</section>

</body>
</html>
